<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/layout :: head('Thông báo - JobCode')}"></head>

<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="flex-grow-1">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold mb-0">
                        <i class="bi bi-bell me-2"></i>Thông báo
                    </h2>
                    <form th:action="@{/notifications/read-all}" method="post" th:if="${!notifications.isEmpty()}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-outline-secondary btn-sm">
                            <i class="bi bi-check-all me-1"></i>Đánh dấu tất cả đã đọc
                        </button>
                    </form>
                </div>

                <div th:if="${notifications.isEmpty()}" class="text-center py-5">
                    <i class="bi bi-bell-slash display-1 text-muted"></i>
                    <p class="text-muted mt-3">Chưa có thông báo nào</p>
                </div>

                <div class="list-group" th:unless="${notifications.isEmpty()}">
                    <div th:each="noti : ${notifications}"
                         class="list-group-item list-group-item-action d-flex justify-content-between align-items-start"
                         th:classappend="${!noti.isRead()} ? 'list-group-item-light fw-semibold' : ''">
                        <div class="ms-2 me-auto">
                            <div class="d-flex align-items-center mb-1">
                                <i class="bi bi-circle-fill text-primary me-2"
                                   th:if="${!noti.isRead()}" style="font-size: 0.5rem;"></i>
                                <span th:text="${noti.getMessage()}">Thông báo</span>
                            </div>
                            <small class="text-muted">
                                <i class="bi bi-clock me-1"></i>
                                <span th:text="${#temporals.format(noti.getCreatedAt(), 'dd/MM/yyyy HH:mm')}">01/01/2026 00:00</span>
                            </small>
                        </div>
                        <div class="d-flex align-items-center gap-2">
                            <a th:if="${noti.getLink() != null}" th:href="${noti.getLink()}"
                               class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-arrow-right"></i>
                            </a>
                            <form th:action="@{/notifications/{id}/read(id=${noti.getId()})}" method="post"
                                  th:if="${!noti.isRead()}">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit" class="btn btn-sm btn-outline-success" title="Đánh dấu đã đọc">
                                    <i class="bi bi-check-lg"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>

</body>
</html>
