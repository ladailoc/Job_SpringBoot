<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Đăng nhập - JobCode')}"></head>

<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container auth-container">
    <div class="auth-card">
        <div class="text-center mb-4">
            <div class="mb-3">
                <i class="bi bi-person-circle" style="font-size:3rem; color:var(--primary);"></i>
            </div>
            <h2>Đăng nhập</h2>
            <p class="subtitle">Chào mừng bạn quay trở lại!</p>
        </div>

        <!-- Alerts -->
        <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center mb-3">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            Email hoặc mật khẩu không đúng.
        </div>
        <div th:if="${param.logout}" class="alert alert-success d-flex align-items-center mb-3">
            <i class="bi bi-check-circle-fill me-2"></i>
            Bạn đã đăng xuất thành công.
        </div>
        <div th:if="${param.registered}" class="alert alert-success d-flex align-items-center mb-3">
            <i class="bi bi-check-circle-fill me-2"></i>
            Đăng ký thành công. Vui lòng đăng nhập.
        </div>

        <form th:action="@{/auth/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="mb-3">
                <label class="form-label">Email</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" class="form-control" name="email" placeholder="Nhập email" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Mật khẩu</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" name="password" placeholder="Nhập mật khẩu" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary-custom">
                <i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập
            </button>
        </form>

        <p class="text-center mt-4 mb-0 text-muted">
            Chưa có tài khoản?
            <a th:href="@{/auth/signup}" class="fw-semibold">Đăng ký ngay</a>
        </p>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>

</body>
</html>
