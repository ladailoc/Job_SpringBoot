<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Đăng ký - JobCode')}"></head>

<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container auth-container" style="max-width:520px;">
    <div class="auth-card">
        <div class="text-center mb-4">
            <div class="mb-3">
                <i class="bi bi-person-plus" style="font-size:3rem; color:var(--primary);"></i>
            </div>
            <h2>Đăng ký tài khoản</h2>
            <p class="subtitle">Tạo tài khoản để bắt đầu tìm việc</p>
        </div>

        <form th:action="@{/auth/signup}" th:object="${registerForm}" method="post">
            <!-- Global Errors -->
            <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger mb-3">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <span th:each="err : ${#fields.globalErrors()}" th:text="${err}"></span>
            </div>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="mb-3">
                <label class="form-label">Họ tên</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" th:field="*{fullName}" placeholder="Nguyễn Văn A">
                </div>
                <div class="text-danger" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" class="form-control" th:field="*{email}" placeholder="email@example.com">
                </div>
                <div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Mật khẩu</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" th:field="*{password}" placeholder="Tối thiểu 6 ký tự">
                </div>
                <div class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Vai trò</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-people"></i></span>
                    <select class="form-select" th:field="*{role}">
                        <option value="">-- Chọn vai trò --</option>
                        <option th:each="role : ${roles}" th:value="${role}" th:text="${role}"></option>
                    </select>
                </div>
                <div class="text-danger" th:if="${#fields.hasErrors('role')}" th:errors="*{role}"></div>
            </div>

            <div class="mb-4">
                <label class="form-label">Tên công ty</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-building"></i></span>
                    <input type="text" class="form-control" th:field="*{companyName}" placeholder="Chỉ bắt buộc với Recruiter">
                </div>
                <div class="text-danger" th:if="${#fields.hasErrors('companyName')}" th:errors="*{companyName}"></div>
            </div>

            <button type="submit" class="btn btn-primary-custom">
                <i class="bi bi-person-plus me-2"></i>Đăng ký
            </button>
        </form>

        <p class="text-center mt-4 mb-0 text-muted">
            Đã có tài khoản?
            <a th:href="@{/auth/login}" class="fw-semibold">Đăng nhập</a>
        </p>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>

</body>
</html>
