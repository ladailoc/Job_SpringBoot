<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head(${pageTitle} + ' - JobCode')}"></head>

<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <!-- Back link -->
                <div class="mb-4">
                    <a th:href="@{/recruiter/jobs}" class="text-muted text-decoration-none">
                        <i class="bi bi-arrow-left me-1"></i>Quay lại quản lý công việc
                    </a>
                </div>

                <div class="form-card">
                    <div class="text-center mb-4">
                        <div class="mb-3">
                            <i class="bi bi-pencil-square" style="font-size:2.5rem; color:var(--primary);"></i>
                        </div>
                        <h2 class="fw-bold" th:text="${pageTitle}">Đăng công việc mới</h2>
                    </div>

                    <form th:action="@{${formAction}}" th:object="${jobForm}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="mb-3">
                            <label class="form-label">Tiêu đề công việc</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-type"></i></span>
                                <input type="text" class="form-control" th:field="*{title}" placeholder="VD: Java Backend Developer">
                            </div>
                            <div class="text-danger" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mô tả công việc</label>
                            <textarea class="form-control" th:field="*{description}" rows="6"
                                      placeholder="Nhập mô tả chi tiết về công việc, yêu cầu, quyền lợi..."></textarea>
                            <div class="text-danger" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Địa điểm</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-geo-alt"></i></span>
                                <input type="text" class="form-control" th:field="*{location}" placeholder="VD: Đà Nẵng">
                            </div>
                            <div class="text-danger" th:if="${#fields.hasErrors('location')}" th:errors="*{location}"></div>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Lương tối thiểu</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-cash"></i></span>
                                    <input type="number" step="0.01" class="form-control" th:field="*{salaryMin}">
                                </div>
                                <div class="text-danger" th:if="${#fields.hasErrors('salaryMin')}" th:errors="*{salaryMin}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Lương tối đa</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-cash-stack"></i></span>
                                    <input type="number" step="0.01" class="form-control" th:field="*{salaryMax}">
                                </div>
                                <div class="text-danger" th:if="${#fields.hasErrors('salaryMax')}" th:errors="*{salaryMax}"></div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Loại công việc</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-briefcase"></i></span>
                                <select class="form-select" th:field="*{jobType}">
                                    <option th:each="type : ${jobTypes}" th:value="${type}" th:text="${type}">FULL_TIME</option>
                                </select>
                            </div>
                            <div class="text-danger" th:if="${#fields.hasErrors('jobType')}" th:errors="*{jobType}"></div>
                        </div>

                        <div class="mb-4">
                            <div class="form-check form-switch">
                                <input type="checkbox" class="form-check-input" th:field="*{active}" id="activeSwitch">
                                <label class="form-check-label fw-semibold" for="activeSwitch">
                                    <i class="bi bi-toggle-on me-1"></i>Đang tuyển
                                </label>
                            </div>
                        </div>

                        <div class="d-flex gap-3">
                            <button type="submit" class="btn btn-save">
                                <i class="bi bi-check-lg me-2"></i>Lưu công việc
                            </button>
                            <a th:href="@{/recruiter/jobs}" class="btn btn-outline-secondary px-4">
                                <i class="bi bi-x-lg me-1"></i>Hủy
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>

</body>
</html>
