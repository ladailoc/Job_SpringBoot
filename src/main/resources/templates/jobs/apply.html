<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Ứng tuyển - JobCode')}"></head>

<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <!-- Back Link -->
                <a th:href="@{/jobs/{id}(id=${job.id})}" class="btn btn-outline-primary mb-4">
                    <i class="bi bi-arrow-left me-1"></i>Quay lại chi tiết công việc
                </a>

                <div class="form-card">
                    <h2 class="fw-bold mb-2">
                        <i class="bi bi-send me-2 text-primary"></i>Ứng tuyển công việc
                    </h2>
                    <h5 class="text-primary mb-4" th:text="${job.title}">Java Backend Developer</h5>

                    <div class="row mb-4">
                        <div class="col-md-6">
                            <div class="detail-card p-3">
                                <div class="info-label">Công ty</div>
                                <div class="info-value">
                                    <i class="bi bi-building me-1"></i>
                                    <span th:text="${job.recruiter.companyName}">Demo Company</span>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="detail-card p-3">
                                <div class="info-label">Địa điểm</div>
                                <div class="info-value">
                                    <i class="bi bi-geo-alt me-1"></i>
                                    <span th:text="${job.location}">Đà Nẵng</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <form th:action="@{/jobs/{id}/apply(id=${job.id})}"
                          th:object="${applicationForm}"
                          method="post">

                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <!-- Global Errors -->
                        <div class="alert alert-danger mb-3" th:if="${#fields.hasGlobalErrors()}">
                            <p class="mb-0" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
                        </div>

                        <div class="mb-4">
                            <label class="form-label" for="coverLetter">
                                <i class="bi bi-pencil-square me-1"></i>Cover letter
                            </label>
                            <textarea th:field="*{coverLetter}"
                                      id="coverLetter"
                                      class="form-control"
                                      rows="8"
                                      placeholder="Viết lý do bạn phù hợp với công việc này..."></textarea>
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('coverLetter')}"
                                 th:errors="*{coverLetter}"></div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label" for="cvLink">
                                <i class="bi bi-link-45deg me-1"></i>CV link
                            </label>
                            <input type="url"
                                   th:field="*{cvLink}"
                                   id="cvLink"
                                   class="form-control"
                                   placeholder="https://drive.google.com/your-cv">
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('cvLink')}"
                                 th:errors="*{cvLink}"></div>
                        </div>

                        <button type="submit" class="btn btn-apply">
                            <i class="bi bi-send me-2"></i>Gửi đơn ứng tuyển
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>

</body>
</html>
